#
# rseq MCU firmware (Nucleo boards): rseq-link transport + physical buses.

# ---- Rust (zephyr crate supplies global allocator + panic handler + log) ----
CONFIG_RUST=y
CONFIG_RUST_ALLOC=y

# ---- Common console/log plumbing; board profiles select the backend. ----
CONFIG_CONSOLE=y
CONFIG_PRINTK=y
CONFIG_LOG=y
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y

# ---- Optional USB CDC device stack is enabled by boards that use it. ----
CONFIG_HWINFO=y

# ---- Physical buses exposed to the rseq VM ----
CONFIG_SPI=y
CONFIG_I2C=y
CONFIG_GPIO=y

# ---- Stack: rseq-vm raw buffer + scratch + TracingBus frame during EXEC/IRQ ----
CONFIG_MAIN_STACK_SIZE=24576

# Avoid shell traffic on the rseq-link transport.
CONFIG_SHELL=n

# rseq MCU firmware (Nucleo F429ZI): rseq-link over USB CDC + real IMU SPI bus.

# ---- Rust (zephyr crate supplies global allocator + panic handler + log) ----
CONFIG_RUST=y
CONFIG_RUST_ALLOC=y

# ---- Console / logs on USART3 (ST-Link VCP) ----
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_PRINTK=y
CONFIG_LOG=y
CONFIG_LOG_BACKEND_UART=y
CONFIG_LOG_BACKEND_RTT=n
CONFIG_USE_SEGGER_RTT=n
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y

# ---- New USB CDC device stack (1 CDC port = rseq-link transport) ----
CONFIG_USB_DEVICE_STACK_NEXT=y
CONFIG_USBD_CDC_ACM_CLASS=y
CONFIG_CDC_ACM_SERIAL_INITIALIZE_AT_BOOT=n
CONFIG_UART_LINE_CTRL=y
CONFIG_HWINFO=y

# ---- IMU bus (QMI8660 on Arduino SPI) ----
CONFIG_SPI=y
CONFIG_I2C=y
CONFIG_GPIO=y

# ---- Stack: rseq-vm 4 KiB scratch + TracingBus ~4 KiB buf during EXEC ----
CONFIG_MAIN_STACK_SIZE=16384

# Avoid UART conflicts; console stays on USART3, protocol on USB CDC.
CONFIG_SHELL=n
